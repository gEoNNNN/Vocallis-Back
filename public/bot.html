<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocallis – Suport Clienți</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d11;
      color: #e2e2ed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid #1c1c26;
      flex-shrink: 0;
      background: #0d0d11;
    }
    .logo { font-size: 1.15rem; font-weight: 700; color: #fff; }
    .logo span { color: #6ee7b7; }
    .logo small { font-weight: 400; font-size: 0.76rem; color: #444; margin-left: 8px; }

    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 13px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 600;
      background: #18181f;
      border: 1px solid #2a2a38;
      transition: all 0.3s;
    }
    #status-badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s;
    }
    #status-badge.listening .dot  { background: #6ee7b7; animation: pulse 1.2s infinite; }
    #status-badge.thinking  .dot  { background: #fbbf24; animation: pulse 1.2s infinite; }
    #status-badge.connected .dot  { background: #34d399; }
    #status-badge.error     .dot  { background: #f87171; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(1.6); }
    }

    /* ── Chat ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #252535; border-radius: 4px; }

    .bubble-row {
      display: flex;
      animation: slide-in 0.2s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .bubble-row.user      { justify-content: flex-end; }
    .bubble-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 74%;
      padding: 10px 15px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble .sender {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      opacity: 0.45;
      margin-bottom: 4px;
    }
    .bubble-row.user .bubble {
      background: #059669;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble-row.assistant .bubble {
      background: #1a1a28;
      color: #d4d4e8;
      border: 1px solid #26263a;
      border-bottom-left-radius: 4px;
    }
    .bubble-row.error .bubble {
      background: #1f1010;
      color: #f87171;
      border: 1px solid #3a1c1c;
      border-radius: 12px;
    }

    /* Cursor blink for streaming */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #6ee7b7;
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 0.75s steps(1) infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Thinking dots */
    .thinking-dots span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #6ee7b7;
      margin: 0 2px;
      animation: bounce 1.1s infinite ease-in-out;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.18s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);   opacity: 0.35; }
      40%            { transform: translateY(-7px); opacity: 1; }
    }

    #empty-state {
      margin: auto;
      text-align: center;
      color: #2e2e42;
    }
    #empty-state svg { width: 52px; height: 52px; margin-bottom: 14px; opacity: 0.5; }
    #empty-state p { font-size: 0.88rem; color: #3a3a55; }

    /* ── Bottom bar ── */
    #bottom-bar {
      flex-shrink: 0;
      border-top: 1px solid #1c1c26;
      padding: 14px 22px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: #0d0d11;
    }

    #interim-ticker {
      font-size: 0.86rem;
      color: #3a3a55;
      font-style: italic;
      min-height: 20px;
      text-align: center;
      max-width: 600px;
      transition: color 0.2s;
    }
    #interim-ticker.active { color: #6ee7b7; }

    .bottom-controls {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    #mic-btn {
      width: 62px; height: 62px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: #059669;
      color: #fff;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.4);
    }
    #mic-btn:hover:not(:disabled) { background: #047857; transform: scale(1.06); }
    #mic-btn.recording {
      background: #dc2626;
      animation: mic-ring 1.5s infinite;
    }
    #mic-btn.recording:hover { background: #b91c1c; }
    #mic-btn:disabled { opacity: 0.35; cursor: default; transform: none !important; }
    @keyframes mic-ring {
      0%   { box-shadow: 0 0 0 0   rgba(220,38,38,0.5); }
      70%  { box-shadow: 0 0 0 16px rgba(220,38,38,0); }
      100% { box-shadow: 0 0 0 0   rgba(220,38,38,0); }
    }

    #clear-btn {
      background: none;
      border: 1px solid #252535;
      color: #444;
      font-size: 0.76rem;
      padding: 6px 13px;
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #clear-btn:hover { color: #f87171; border-color: #f87171; }

    #mic-label { font-size: 0.76rem; color: #3a3a55; }
  </style>
</head>
<body>

  <header>
    <div style="display:flex;align-items:center;gap:14px">
      <a href="/" style="color:#3a3a55;font-size:0.8rem;text-decoration:none;border:1px solid #252535;padding:4px 10px;border-radius:7px;transition:color .2s" onmouseover="this.style.color='#6ee7b7'" onmouseout="this.style.color='#3a3a55'">← Acasă</a>
      <div class="logo">Vocallis <span>Suport</span><small>Asistent Clienți · TechMD SRL</small></div>
    </div>
    <div id="status-badge">
      <span class="dot"></span>
      <span id="status-text">Deconectat</span>
    </div>
  </header>

  <div id="chat">
    <div id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M12 2a10 10 0 1 1 0 20A10 10 0 0 1 12 2z"/>
        <path d="M8 12h8M12 8v8"/>
      </svg>
      <p>Apasă microfonul și începe să vorbești.</p>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="interim-ticker">—</div>
    <div class="bottom-controls">
      <button id="clear-btn">Resetează</button>
      <button id="mic-btn" title="Pornește microfonul">🎤</button>
      <span id="mic-label">Apasă pentru a vorbi</span>
    </div>
  </div>

  <script>
    const micBtn        = document.getElementById('mic-btn')
    const micLabel      = document.getElementById('mic-label')
    const statusBadge   = document.getElementById('status-badge')
    const statusText    = document.getElementById('status-text')
    const interimTicker = document.getElementById('interim-ticker')
    const chat          = document.getElementById('chat')
    const clearBtn      = document.getElementById('clear-btn')

    let ws          = null
    let audioCtx    = null
    let processor   = null
    let micStream   = null
    let recording   = false
    let ttsPlaying  = false
    let ttsBuffer   = ''

    let assistantBubble    = null
    let assistantTextNode  = null

    // ── Helpers ──────────────────────────────────────────────────────────────

    function setStatus(state, text) {
      statusBadge.className = ''
      if (state) statusBadge.classList.add(state)
      statusText.textContent = text
    }

    function ts() {
      const n = new Date()
      return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    function removeEmptyState() {
      const el = document.getElementById('empty-state')
      if (el) el.remove()
    }

    function addBubble(role, text) {
      removeEmptyState()
      const row = document.createElement('div')
      row.className = `bubble-row ${role}`
      const label = role === 'user' ? 'Tu' : role === 'error' ? 'Eroare' : 'Bot'
      row.innerHTML = `<div class="bubble"><div class="sender">${label} · ${ts()}</div>${escHtml(text)}</div>`
      chat.appendChild(row)
      chat.scrollTop = chat.scrollHeight
      return row
    }

    function addThinking() {
      removeEmptyState()
      const row = document.createElement('div')
      row.className = 'bubble-row assistant'
      row.id = 'thinking-bubble'
      row.innerHTML = `<div class="bubble"><div class="thinking-dots"><span></span><span></span><span></span></div></div>`
      chat.appendChild(row)
      chat.scrollTop = chat.scrollHeight
    }

    function removeThinking() {
      const el = document.getElementById('thinking-bubble')
      if (el) el.remove()
    }

    function startAssistantBubble() {
      removeThinking()
      removeEmptyState()
      const row = document.createElement('div')
      row.className = 'bubble-row assistant'
      row.innerHTML = `<div class="bubble"><div class="sender">Vocallis · ${ts()}</div><span class="stream-text"></span><span class="cursor"></span></div>`
      chat.appendChild(row)
      assistantBubble   = row
      assistantTextNode = row.querySelector('.stream-text')
      chat.scrollTop    = chat.scrollHeight
    }

    function appendAssistantChunk(chunk) {
      if (!assistantTextNode) return
      assistantTextNode.textContent += chunk
      chat.scrollTop = chat.scrollHeight
    }

    function finalizeAssistantBubble() {
      if (assistantBubble) {
        const cursor = assistantBubble.querySelector('.cursor')
        if (cursor) cursor.remove()
        assistantBubble.id = ''
      }
      assistantBubble   = null
      assistantTextNode = null
    }

    function setInterim(text) {
      interimTicker.textContent = text || '—'
      interimTicker.className   = text ? 'active' : ''
    }

    // ── TTS ──────────────────────────────────────────────────────────────────

    async function speakText(text) {
      if (!text.trim()) return
      ttsPlaying = true
      try {
        const res = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text,
            voice: 'nova',
            instructions: 'You are speaking Romanian with a warm, natural Moldovan accent. Your tone is friendly, calm and conversational — like a helpful colleague. Speak at a natural, unhurried Romanian pace. Pronounce Romanian words correctly, with soft intonation typical of the Republic of Moldova. Use natural speech rhythm, with gentle emphasis on key words.',
          }),
        })
        if (!res.ok) { ttsPlaying = false; return }
        const blob = await res.blob()
        const url  = URL.createObjectURL(blob)
        const audio = new Audio(url)
        audio.play()
        audio.onended = () => { URL.revokeObjectURL(url); ttsPlaying = false }
        audio.onerror = () => { URL.revokeObjectURL(url); ttsPlaying = false }
      } catch { ttsPlaying = false }
    }

    // ── Audio pipeline ────────────────────────────────────────────────────────

    function startPCM(stream) {
      audioCtx  = new AudioContext({ sampleRate: 16000 })
      const src = audioCtx.createMediaStreamSource(stream)
      processor = audioCtx.createScriptProcessor(4096, 1, 1)
      src.connect(processor)
      processor.connect(audioCtx.destination)
      processor.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN || ttsPlaying) return
        const f32 = e.inputBuffer.getChannelData(0)
        const i16 = new Int16Array(f32.length)
        for (let i = 0; i < f32.length; i++) {
          i16[i] = Math.max(-32768, Math.min(32767, Math.round(f32[i] * 32768)))
        }
        ws.send(i16.buffer)
      }
    }

    function stopAudio() {
      if (processor) { processor.disconnect(); processor = null }
      if (audioCtx)  { audioCtx.close();       audioCtx  = null }
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null }
    }

    // ── Session ───────────────────────────────────────────────────────────────

    async function startSession() {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      } catch {
        setStatus('error', 'Microfon indisponibil')
        return
      }

      ws = new WebSocket(`ws://${location.host}/ws/support`)
      ws.binaryType = 'arraybuffer'

      ws.onopen = () => {
        setStatus('listening', 'Ascultă...')
        micBtn.classList.add('recording')
        micBtn.title         = 'Oprește'
        micLabel.textContent = 'Apasă pentru a opri'
        recording            = true
        startPCM(micStream)
      }

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data)

        if (msg.type === 'interim') {
          setInterim(msg.text)

        } else if (msg.type === 'user') {
          setInterim('')
          addBubble('user', msg.text)

        } else if (msg.type === 'thinking') {
          setStatus('thinking', 'Se gândește...')
          micBtn.disabled = true
          addThinking()

        } else if (msg.type === 'assistant_chunk') {
          if (!assistantTextNode) { startAssistantBubble(); ttsBuffer = '' }
          ttsBuffer += msg.content
          appendAssistantChunk(msg.content)

        } else if (msg.type === 'assistant_end') {
          finalizeAssistantBubble()
          setStatus('listening', 'Ascultă...')
          micBtn.disabled = false
          speakText(ttsBuffer)
          ttsBuffer = ''

        } else if (msg.type === 'error') {
          finalizeAssistantBubble()
          removeThinking()
          addBubble('error', msg.message)
          setStatus('listening', 'Ascultă...')
          micBtn.disabled = false
        }
      }

      ws.onclose = () => {
        stopSession(false)
        setStatus('', 'Deconectat')
      }

      ws.onerror = () => setStatus('error', 'Eroare conexiune')
    }

    function stopSession(closeWs = true) {
      stopAudio()
      finalizeAssistantBubble()
      if (closeWs && ws && ws.readyState === WebSocket.OPEN) {
        ws.close()
        ws = null
      }
      recording = false
      micBtn.classList.remove('recording')
      micBtn.disabled      = false
      micBtn.title         = 'Pornește microfonul'
      micLabel.textContent = 'Apasă pentru a vorbi'
      setInterim('')
      removeThinking()
    }

    // ── Events ────────────────────────────────────────────────────────────────

    micBtn.addEventListener('click', () => {
      if (recording) {
        stopSession(true)
        setStatus('', 'Deconectat')
      } else {
        startSession()
      }
    })

    clearBtn.addEventListener('click', () => {
      finalizeAssistantBubble()
      chat.innerHTML = `<div id="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 2a10 10 0 1 1 0 20A10 10 0 0 1 12 2z"/><path d="M8 12h8M12 8v8"/></svg><p>Apasă microfonul și începe să vorbești.</p></div>`
    })
  </script>
</body>
</html>
